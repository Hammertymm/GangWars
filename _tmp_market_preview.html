<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Market Preview</title>
<style>
  html,body{margin:0;padding:0;background:#000;}
  #wrap{display:flex;flex-wrap:wrap;gap:12px;padding:12px;justify-content:center;}
  .frame{background:#111;padding:8px;border:1px solid #333;}
  .frame h2{margin:0 0 6px;font:12px monospace;color:#9c8d73;text-align:center;}
  iframe{border:0;background:#15110b;display:block;}
</style>
</head>
<body>
<div id="wrap"></div>
<script>
const scenarios = [
  { id: "default", label: "Default market", setup: s => s },
  { id: "held", label: "Held goods (BUY|SELL)", setup: s => {
    s.inventory.moonshine = 3; s.inventory.cigars = 12; s.inventory.diamonds = 1; return s;
  }},
  { id: "dead", label: "Unavailable good", setup: s => {
    s.prices.furcoats = null; return s;
  }},
];
const sizes = [
  { w: 360, h: 640, name: "iPhone SE" },
  { w: 390, h: 844, name: "iPhone 14" },
  { w: 430, h: 932, name: "Pro Max" },
];
const wrap = document.getElementById("wrap");
for (const sc of scenarios) {
  for (const sz of sizes) {
    const box = document.createElement("div");
    box.className = "frame";
    box.innerHTML = `<h2>${sc.label} · ${sz.name} (${sz.w}×${sz.h})</h2>`;
    const iframe = document.createElement("iframe");
    iframe.width = sz.w;
    iframe.height = sz.h;
    iframe.src = `gangwars.html?preview=${sc.id}`;
    box.appendChild(iframe);
    wrap.appendChild(box);
  }
}
</script>
</body>
</html>
